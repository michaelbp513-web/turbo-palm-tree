version: '3.8'\n\nservices:\n  postgres:\n    image: postgres:15-alpine\n    container_name: n8n_revenue_db_prod\n    restart: always\n    environment:\n      POSTGRES_USER: ${POSTGRES_USER:-revenue_admin}\n      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}\n      POSTGRES_DB: ${POSTGRES_DB:-n8n_revenue}\n    volumes:\n      - postgres_data_prod:/var/lib/postgresql/data\n      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql\n      - ./database/seed-data.sql:/docker-entrypoint-initdb.d/02-seed-data.sql\n      - ./backups:/backups\n    ports:\n      - \"5432:5432\"\n    environment:\n      POSTGRES_INITDB_ARGS: \"-c shared_buffers=256MB -c max_connections=200\"\n    networks:\n      - n8n_network\n    healthcheck:\n      test: [\"CMD-SHELL\", \"pg_isready -U ${POSTGRES_USER:-revenue_admin}\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n\n  n8n:\n    image: n8nio/n8n:latest\n    container_name: n8n_revenue_engine_prod\n    restart: always\n    environment:\n      DB_TYPE: postgresdb\n      DB_POSTGRESDB_HOST: postgres\n      DB_POSTGRESDB_PORT: 5432\n      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n_revenue}\n      DB_POSTGRESDB_USER: ${POSTGRES_USER:-revenue_admin}\n      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}\n      N8N_HOST: ${N8N_HOST:-0.0.0.0}\n      N8N_PORT: 5678\n      N8N_PROTOCOL: https\n      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-https://yourdomain.com}\n      N8N_WEBHOOK_TUNNEL_URL: ${N8N_WEBHOOK_TUNNEL_URL:-https://yourdomain.com}\n      JWT_SECRET: ${JWT_SECRET}\n      GENERIC_TIMEZONE: ${TIMEZONE:-America/New_York}\n      EXECUTIONS_DATA_PRUNE: \"true\"\n      EXECUTIONS_DATA_MAX_AGE: 168\n      EXECUTIONS_PROCESS: main\n      N8N_LOG_LEVEL: info\n      WEBHOOK_TUNNEL_TIMEOUT: 60\n    ports:\n      - \"5678:5678\"\n    volumes:\n      - n8n_data_prod:/home/node/.n8n\n      - ./workflows:/home/node/.n8n/workflows\n      - ./backups:/backups\n    depends_on:\n      postgres:\n        condition: service_healthy\n    networks:\n      - n8n_network\n    healthcheck:\n      test: [\"CMD\", \"curl\", \"-f\", \"http://localhost:5678/api/v1/health\"]\n      interval: 30s\n      timeout: 10s\n      retries: 5\n    deploy:\n      resources:\n        limits:\n          cpus: '2'\n          memory: 2G\n        reservations:\n          cpus: '1'\n          memory: 1G\n\n  pgadmin:\n    image: dpage/pgadmin4:latest\n    container_name: n8n_revenue_pgadmin_prod\n    restart: always\n    environment:\n      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}\n      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}\n    ports:\n      - \"5050:80\"\n    depends_on:\n      - postgres\n    networks:\n      - n8n_network\n    volumes:\n      - pgadmin_data:/var/lib/pgadmin\n\n  backup:\n    image: postgres:15-alpine\n    container_name: n8n_revenue_backup\n    restart: daily\n    environment:\n      PGPASSWORD: ${POSTGRES_PASSWORD}\n    volumes:\n      - ./backups:/backups\n      - ./scripts/backup.sh:/backup.sh\n    command: /bin/sh -c \"chmod +x /backup.sh && /backup.sh\"\n    depends_on:\n      - postgres\n    networks:\n      - n8n_network\n\n  nginx:\n    image: nginx:alpine\n    container_name: n8n_revenue_nginx\n    restart: always\n    ports:\n      - \"80:80\"\n      - \"443:443\"\n    volumes:\n      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro\n      - ./nginx/ssl:/etc/nginx/ssl:ro\n      - ./nginx/conf.d:/etc/nginx/conf.d:ro\n    depends_on:\n      - n8n\n    networks:\n      - n8n_network\n\nvolumes:\n  postgres_data_prod:\n    driver: local\n  n8n_data_prod:\n    driver: local\n  pgadmin_data:\n    driver: local\n\nnetworks:\n  n8n_network:\n    driver: bridge\n"
